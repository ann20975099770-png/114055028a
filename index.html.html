<!DOCTYPE html>

<style>

    font-family: 'Noto Sans TC', sans-serif;
    background: #f0f2f5;
    margin: 0;
    padding: 20px;
    color: #333;
  }

  .container {
    max-width: 900px;
    margin: auto;
    background: #fff;
    padding: 20px 30px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    display: flex;
    flex-wrap: wrap;
  }

  .left, .right {
    padding: 15px;
  }

  .left {
    flex: 0 0 220px;
    border-right: 2px solid #e0e0e0;
    text-align: center;
  }

  .left img {
    border-radius: 10px;
    width: 150px;
    margin-bottom: 15px;
  }

  .left p {
    margin: 5px 0;
    font-size: 0.95em;
  }

  .right {
    flex: 1;
    padding-left: 30px;
  }

  h1 {
    font-size: 2em;
    color: #2c3e50;
    margin-bottom: 5px;
  }

  h2 {
    color: #34495e;
    margin-top: 20px;
    margin-bottom: 8px;
    border-bottom: 2px solid #e67e22;
    display: inline-block;
    padding-bottom: 3px;
    font-size: 1.2em;
  }

  p, li {
    margin-bottom: 8px;
    line-height: 1.5;
  }

  ul {
    padding-left: 20px;
    margin-bottom: 10px;
  }

  .skills span {
    display: inline-block;
    background: #e67e22;
    color: #fff;
    padding: 4px 8px;
    border-radius: 4px;
    margin-right: 5px;
    margin-bottom: 5px;
    font-size: 0.9em;
  }

  button {
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    background: #3498db;
    color: #fff;
    cursor: pointer;
    margin-top: 15px;
  }

  button:hover { background: #2980b9; }

  #message { margin-top: 12px; font-weight: bold; color: green; }
</style>
</head>
<body>
<div class="container">

    <p>亞洲大學 • 第一學年</p>

    <p>學號: 114055028</p>
    <p>Email: ann20975099770@gmail.com</p>
    <p>電話: 0910-221-772</p>

<script>

    const msg = document.getElementById('message');
    msg.textContent = "謝謝觀看我的履歷！";
  }
</script>
