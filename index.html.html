<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>履歷</title>

<style>
body {
  margin: 0;
  font-family: 'Noto Sans TC', sans-serif;
  background: #eee;
}

.container {
  display: flex;
  max-width: 900px;
  margin: 40px auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* 左側 */
.left {
  width: 35%;
  background: #2f2f33;
  color: white;
  padding: 30px 20px;
  text-align: center;
}

.left img {
  width: 140px;
  border-radius: 50%;
  margin-bottom: 15px;
}

.left h1 {
  font-size: 20px;
  margin: 10px 0;
}

.left p {
  font-size: 14px;
  margin: 5px 0;
}

.section-title {
  margin-top: 25px;
  font-size: 14px;
  border-bottom: 1px solid #888;
  padding-bottom: 5px;
}

.contact {
  font-size: 13px;
  margin-top: 10px;
}

/* 右側 */
.right {
  width: 65%;
  background: white;
  padding: 30px;
}

.right h2 {
  border-bottom: 2px solid #333;
  padding-bottom: 5px;
  margin-top: 20px;
}

.right p {
  margin: 10px 0;
}

.timeline {
  border-left: 2px solid #ccc;
  margin-left: 10px;
  padding-left: 15px;
}

.timeline-item {
  margin-bottom: 15px;
}

.skills span {
  display: inline-block;
  background: #444;
  color: white;
  padding: 5px 10px;
  margin: 5px 5px 0 0;
  border-radius: 5px;
  font-size: 13px;
}

button {
  margin-top: 20px;
  padding: 10px;
  background: #333;
  color: white;
  border: none;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="container">

  <!-- 左側 -->
  <div class="left">
    <img src="images/myphoto.jpg">

    <h1>陳沛慈</h1>
    <p>亞洲大學</p>
    <p>室內設計系</p>
    <p>學號: 114055028</p>

    <div class="section-title">CONTACT</div>
    <div class="contact">
      <p>Email:<br>ann20975099770@gmail.com</p>
      <p>電話:<br>0910-221-772</p>
    </div>
  </div>

  <!-- 右側 -->
  <div class="right">

    <h2>自我介紹</h2>
    <p>
      喜歡小動物，有耐心，喜歡做模型，
      對室內設計與空間創作有興趣，
      希望透過實習累積實務經驗。
    </p>

    <h2>學歷</h2>
    <div class="timeline">
      <div class="timeline-item">
        <b>2025 - 現在</b><br>
        亞洲大學 室內設計系
      </div>
    </div>

    <h2>技能</h2>
    <div class="skills">
      <span>模型製作</span>
      <span>繪畫設計圖</span>
      <span>空間設計概念</span>
    </div>

    <h2>經歷</h2>
    <div class="timeline">
      <div class="timeline-item">
        目前無正式工作經驗，可於實習期間快速學習並配合團隊合作
      </div>
    </div>

    <button onclick="showMessage()">點我</button>
    <p id="msg"></p>

  </div>

</div>

<script>
function showMessage(){
  document.getElementById("msg").innerText="謝謝觀看我的履歷！";
}
</script>

</body>
</html>
